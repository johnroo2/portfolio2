<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>John Liu</title>
    <link rel="preload" href="/fonts/inconsolata/Inconsolata-VariableFont.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/fonts/raleway/Raleway-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var theme = stored === 'dark' || stored === 'light' ? stored : prefersDark ? 'dark' : 'light'
        if (theme === 'dark') document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
